name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_IMAGE_NAME: omnifs-ci
  DOCKER_IMAGE_ARTIFACT: omnifs-ci-image
  DOCKER_CACHE_SCOPE: omnifs-image-${{ github.head_ref || github.ref_name }}
  PR_APPROVAL_LABEL: ci-approved

jobs:
  pr-gate:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
    steps:
      - id: gate
        run: echo "approved=${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, env.PR_APPROVAL_LABEL) }}" >> "$GITHUB_OUTPUT"

  rust-lint:
    if: needs.pr-gate.outputs.approved == 'true'
    needs: pr-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Set Cargo parallelism
        run: echo "CARGO_BUILD_JOBS=$(nproc)" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          prefix-key: v1-rust
          shared-key: omnifs-rust-v1
          cache-on-failure: true
          save-if: false

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run core clippy
        run: cargo clippy -p omnifs-cli -p omnifs-host -- -D warnings

      - name: Run provider clippy
        run: cargo clippy -p omnifs-provider-github -p omnifs-provider-dns -p test-provider --target wasm32-wasip1 -- -D warnings

  rust-build-test:
    if: needs.pr-gate.outputs.approved == 'true'
    needs: pr-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Set Cargo parallelism
        run: echo "CARGO_BUILD_JOBS=$(nproc)" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          prefix-key: v1-rust
          shared-key: omnifs-rust-v1
          cache-on-failure: true

      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build providers
        run: |
          set -euo pipefail
          for manifest in providers/*/Cargo.toml; do
            cargo component build --manifest-path "$manifest" --release --target-dir target
          done

      - name: Run core tests
        run: cargo nextest run --release -p omnifs-cli -p omnifs-host

      - name: Build CLI release binary
        run: cargo build --release -p omnifs-cli

      - name: Stage runtime artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/omnifs dist/omnifs
          cp target/wasm32-wasip1/release/omnifs_provider_github.wasm dist/omnifs_provider_github.wasm
          cp target/wasm32-wasip1/release/omnifs_provider_dns.wasm dist/omnifs_provider_dns.wasm

      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: omnifs-runtime-artifacts
          path: dist/
          if-no-files-found: error
          compression-level: 0

  docker-pull-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: rust-build-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download runtime artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: omnifs-runtime-artifacts
          path: dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build Docker image
        id: docker-build
        continue-on-error: true
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          target: runtime-prebuilt
          pull: true
          outputs: type=docker,dest=/tmp/omnifs-ci.tar
          tags: ${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ env.DOCKER_CACHE_SCOPE }}
          cache-to: type=gha,scope=${{ env.DOCKER_CACHE_SCOPE }},mode=max,ignore-error=true
          github-token: ${{ github.token }}

      - name: Upload Docker image
        if: steps.docker-build.outcome == 'success'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ env.DOCKER_IMAGE_ARTIFACT }}
          path: /tmp/omnifs-ci.tar
          if-no-files-found: error
          compression-level: 0

      - name: Fail if Docker build failed
        if: steps.docker-build.outcome != 'success'
        run: exit 1

      - name: Load Docker image
        run: docker load -i /tmp/omnifs-ci.tar

      - name: Start omnifs container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          docker run -d \
            --name omnifs-smoke \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --security-opt apparmor:unconfined \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e GIT_SSH_COMMAND='ssh -F /dev/null -o StrictHostKeyChecking=accept-new' \
            ${{ env.DOCKER_IMAGE_NAME }}:latest

          for _ in $(seq 1 60); do
            if docker exec omnifs-smoke sh -lc "grep -qs ' /github ' /proc/mounts"; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx omnifs-smoke; then
              docker logs omnifs-smoke >&2 || true
              docker exec omnifs-smoke sh -lc 'cat /tmp/omnifs.log' >&2 || true
              exit 1
            fi

            sleep 1
          done

          docker logs omnifs-smoke >&2 || true
          docker exec omnifs-smoke sh -lc 'cat /tmp/omnifs.log' >&2 || true
          exit 1

      - name: Run demo smoke script
        run: |
          set -euo pipefail
          docker exec omnifs-smoke env \
            OMNIFS_DEMO_MODE=smoke \
            OMNIFS_DEMO_OWNER=ollama \
            OMNIFS_DEMO_REPO=ollama \
            /tmp/demo.sh

      - name: Dump omnifs log on failure
        if: failure()
        run: |
          docker logs omnifs-smoke || true
          docker exec omnifs-smoke sh -lc 'cat /tmp/omnifs.log' || true

      - name: Clean up container
        if: always()
        run: docker rm -f omnifs-smoke >/dev/null 2>&1 || true

  docker-compose-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: rust-build-test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2

      - name: Start SSH agent socket
        run: |
          set -euo pipefail
          eval "$(ssh-agent -a "$RUNNER_TEMP/ssh-agent.sock")"
          echo "SSH_AUTH_SOCK=$RUNNER_TEMP/ssh-agent.sock" >> "$GITHUB_ENV"

      - name: Create GitHub token secret
        run: |
          set -euo pipefail
          mkdir -p .secrets
          printf '%s' "${{ github.token }}" > .secrets/github_token

      - name: Start compose stack
        run: |
          set -euo pipefail
          docker compose up --build -d

          for _ in $(seq 1 60); do
            if docker compose exec -T omnifs sh -lc "grep -qs ' /github ' /proc/mounts"; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx omnifs; then
              docker compose logs omnifs >&2 || true
              docker compose exec -T omnifs sh -lc 'cat /tmp/omnifs.log' >&2 || true
              exit 1
            fi

            sleep 1
          done

          docker compose logs omnifs >&2 || true
          docker compose exec -T omnifs sh -lc 'cat /tmp/omnifs.log' >&2 || true
          exit 1

      - name: Run compose smoke script
        run: |
          set -euo pipefail
          docker compose exec -T omnifs env \
            OMNIFS_DEMO_MODE=smoke \
            OMNIFS_DEMO_OWNER=ollama \
            OMNIFS_DEMO_REPO=ollama \
            /tmp/demo.sh

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose logs omnifs || true
          docker compose exec -T omnifs sh -lc 'cat /tmp/omnifs.log' || true

      - name: Clean up compose stack
        if: always()
        run: docker compose down --remove-orphans --volumes

  docker-publish:
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-build-test, docker-pull-smoke, docker-compose-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4.3.0
        with:
          name: ${{ env.DOCKER_IMAGE_ARTIFACT }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/omnifs-ci.tar

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Publish Docker image
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag ${{ env.DOCKER_IMAGE_NAME }}:latest "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
