name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Set Cargo parallelism
        run: echo "CARGO_BUILD_JOBS=$(nproc)" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          cache-on-failure: true

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run core clippy
        run: cargo clippy -p omnifs-cli -p omnifs-host -- -D warnings

      - name: Run provider clippy
        run: cargo clippy -p omnifs-provider-github -p test-provider --target wasm32-wasip1 -- -D warnings

      - name: Build providers
        run: |
          set -euo pipefail
          for manifest in providers/*/Cargo.toml; do
            cargo component build --manifest-path "$manifest" --release --target-dir target
          done

      - name: Run core tests
        run: cargo test -p omnifs-cli -p omnifs-host

  docker-smoke:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          pull: true
          tags: omnifs-ci:latest
          cache-from: type=gha,scope=docker-smoke
          cache-to: type=gha,mode=max,scope=docker-smoke

      - name: Start omnifs container
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          docker run -d \
            --name omnifs-smoke \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --security-opt apparmor:unconfined \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e GIT_SSH_COMMAND='ssh -F /dev/null -o StrictHostKeyChecking=accept-new' \
            omnifs-ci:latest \
            bash -lc 'RUST_LOG=info exec omnifs mount --mount-point /github --config-dir /root/.omnifs --cache-dir /tmp/omnifs-cache >/tmp/omnifs.log 2>&1'

          for _ in $(seq 1 60); do
            if docker exec omnifs-smoke sh -lc "grep -qs ' /github ' /proc/mounts"; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx omnifs-smoke; then
              docker exec omnifs-smoke sh -lc 'cat /tmp/omnifs.log' >&2 || true
              exit 1
            fi

            sleep 1
          done

          docker exec omnifs-smoke sh -lc 'cat /tmp/omnifs.log' >&2 || true
          exit 1

      - name: Run demo smoke script
        run: |
          set -euo pipefail
          docker exec omnifs-smoke env OMNIFS_DEMO_MODE=smoke /tmp/demo.sh

      - name: Dump omnifs log on failure
        if: failure()
        run: docker exec omnifs-smoke sh -lc 'cat /tmp/omnifs.log' || true

      - name: Clean up container
        if: always()
        run: docker rm -f omnifs-smoke >/dev/null 2>&1 || true

  docker-publish:
    runs-on: ubuntu-latest
    needs: docker-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-publish
          cache-to: type=gha,mode=max,scope=docker-publish
