name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          target: wasm32-wasip1
          cache: false
          rustflags: ""

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Build test provider
        run: cargo component build --manifest-path providers/test/Cargo.toml --release --target-dir target

      - name: Run tests
        run: cargo test --workspace

  providers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-wasip1
          cache: false
          rustflags: ""

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build providers
        run: cargo build --manifest-path providers/Cargo.toml --target wasm32-wasip1
