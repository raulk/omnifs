name: omnifs

services:
  omnifs:
    build:
      context: .
    image: ghcr.io/raulk/omnifs:latest
    container_name: omnifs
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      SSH_AUTH_SOCK: /ssh-agent
      GIT_SSH_COMMAND: ssh -F /dev/null -o StrictHostKeyChecking=accept-new
    secrets:
      - github_token
    volumes:
      - ${SSH_AUTH_SOCK:?set SSH_AUTH_SOCK on the host}:/ssh-agent
      - ./scripts/demo.sh:/tmp/demo.sh:ro

secrets:
  github_token:
    file: ${GITHUB_TOKEN_FILE:-.secrets/github_token}
